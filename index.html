<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="歐昇計價">
    
    <title>歐昇窗簾計價神器</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
            color: #1e293b; 
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            min-height: 100vh;
            scroll-behavior: smooth;
        }
        
        .container { 
            background: white; 
            padding: calc(15px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px; 
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: padding-bottom 0.3s;
        }

        @media (min-width: 768px) {
            body { padding: 40px 20px; background-color: #e2e8f0; }
            .container { 
                min-height: auto;
                border-radius: 24px; 
                box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
                padding: 30px 40px; 
            }
        }
        
        /* 標題與紀錄按鈕區塊 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 15px;
            margin-top: 10px;
            margin-bottom: 25px;
        }
        h1 { 
            font-size: 26px; 
            color: #0f172a; 
            margin: 0;
            font-weight: 900;
        }
        .btn-open-history {
            background: #e0e7ff;
            color: #4338ca;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 0 #c7d2fe;
        }
        .btn-open-history:active { transform: translateY(2px); box-shadow: 0 0 0 transparent; }
        
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        
        label {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
        }
        
        select, input[type="text"] {
            width: 100%;
            padding: 16px 15px;
            font-size: 22px;
            color: #0f172a;
            background-color: #f8fafc;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
            font-weight: 700;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group input, .input-group select { margin-bottom: 0 !important; }
        .input-group input { flex: 2; text-align: center; font-size: 24px; letter-spacing: 1px; }
        .input-group select { flex: 1; padding: 14px 8px; font-size: 18px; }

        select:focus, input[type="text"]:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .highlight-input { border-color: #fca5a5 !important; background-color: #fef2f2 !important; color: #b91c1c !important; }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            background-color: #fff1f2;
            border: 2px solid #fecaca;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .checkbox-container input[type="checkbox"] {
            width: 28px;
            height: 28px;
            margin-right: 12px;
            accent-color: #ef4444;
        }
        .checkbox-container label {
            margin-bottom: 0;
            font-size: 18px;
            color: #b91c1c;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        .btn { 
            flex: 1;
            padding: 18px; 
            font-size: 22px; 
            color: white; 
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 900; 
            touch-action: manipulation; 
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        
        .btn-calc { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-reset { background: linear-gradient(135deg, #94a3b8, #64748b); box-shadow: 0 4px 15px rgba(100, 116, 139, 0.3); flex: 0.5; }
        
        .result-card {
            background: #1e293b;
            color: #f8fafc;
            padding: 25px 20px;
            border-radius: 16px;
            font-size: 18px;
            line-height: 1.8;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: none;
            margin-bottom: 30px;
        }

        .result-total {
            font-size: 36px;
            color: #10b981;
            text-align: center;
            font-weight: 900;
            border-bottom: 2px dashed #475569;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .result-details { font-family: monospace; white-space: pre-wrap; color: #cbd5e1; }
        .section-title { color: #3b82f6; font-weight: 800; font-size: 20px; margin-top: 10px; display: inline-block; }

        /* --- 歷史紀錄彈出視窗 (Modal) --- */
        .history-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100dvh;
            background: rgba(15, 23, 42, 0.6);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .history-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .history-panel {
            background: #f1f5f9;
            width: 100%;
            height: 85dvh;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 24px 24px 0 0;
            padding: 25px 20px calc(20px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        .history-overlay.active .history-panel { transform: translateY(0); }
        
        .history-header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .history-header-box h2 { margin: 0; font-size: 22px; color: #1e293b; }
        .history-actions { display: flex; gap: 10px; }
        
        .btn-clear-history { background: #fee2e2; color: #ef4444; border: none; padding: 8px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-close-history { background: #cbd5e1; color: #334155; border: none; padding: 8px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .history-empty {
            text-align: center;
            color: #94a3b8;
            margin-top: 50px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .history-item {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .history-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .history-time { font-size: 13px; color: #64748b; margin-top: 4px; }
        .history-category { font-size: 18px; font-weight: 900; color: #0f172a; }
        .history-size { font-size: 15px; color: #475569; margin-bottom: 12px; font-weight: bold; }
        .history-total { font-size: 22px; font-weight: 900; color: #10b981; }
        
        .history-details-btn {
            background: #f1f5f9; border: none; color: #3b82f6; width: 100%;
            font-size: 15px; font-weight: bold; padding: 10px; border-radius: 10px; cursor: pointer;
        }
        .history-details-content {
            display: none; background: #1e293b; color: #cbd5e1; padding: 15px;
            border-radius: 12px; margin-top: 10px; font-family: monospace; font-size: 14px;
            white-space: pre-wrap; line-height: 1.6;
        }

        /* 虛擬鍵盤 */
        .numpad-drawer {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #cbd5e1;
            padding: 15px 12px calc(15px + env(safe-area-inset-bottom));
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15); transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1000; display: flex; flex-direction: column; gap: 10px;
        }
        .numpad-drawer.active { transform: translateY(0); }
        @media (min-width: 768px) { .numpad-drawer { display: none !important; } }

        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad-btn {
            background: white; border: none; border-radius: 12px; padding: 15px 0;
            font-size: 28px; font-weight: 800; color: #1e293b; box-shadow: 0 2px 0 #94a3b8;
            touch-action: manipulation; cursor: pointer;
        }
        .numpad-btn:active { background: #e2e8f0; transform: translateY(2px); box-shadow: 0 0 0 #94a3b8; }
        .numpad-action { background: #ef4444; color: white; box-shadow: 0 2px 0 #b91c1c; }
        .numpad-action:active { background: #dc2626; box-shadow: 0 0 0 #b91c1c; }
        .numpad-header-bar { display: flex; justify-content: flex-end; }
        .btn-hide-numpad { background: #3b82f6; color: white; font-weight: bold; font-size: 16px; border: none; padding: 10px 20px; border-radius: 20px; box-shadow: 0 2px 0 #2563eb; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="header-row">
        <h1>歐昇窗簾計價神器</h1>
        <button class="btn-open-history" onclick="openHistory()">📜 紀錄</button>
    </div>

    <div class="form-group">
        <label>產品分類</label>
        <select id="category" onchange="toggleFields()">
            <option value="five">五尺布 (折景/蛇簾)</option>
            <option value="nine">九呎布 (折景/蛇簾)</option>
            <option value="fixed">定寬布 / 九呎布橫車</option>
            <option value="roll">捲材類 (捲簾/調光/百葉/風琴)</option>
            <option value="door">拉門</option>
        </select>
    </div>

    <div class="form-group">
        <label>寬度</label>
        <div class="input-group">
            <input type="text" id="width" class="numpad-target" inputmode="none" placeholder="輸入數值">
            <select id="unit-w">
                <option value="cm">公分 (cm)</option>
                <option value="ft">台尺</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>高度</label>
        <div class="input-group">
            <input type="text" id="height" class="numpad-target" inputmode="none" placeholder="輸入數值">
            <select id="unit-h">
                <option value="cm">公分 (cm)</option>
                <option value="ft">台尺</option>
            </select>
        </div>
    </div>

    <div class="form-group" id="min-area-group" style="display: none;">
        <label>最低才數防呆</label>
        <input type="text" id="min-area" class="numpad-target" inputmode="none" value="15">
    </div>

    <div class="form-row">
        <div style="flex: 1;">
            <label>基本單價</label>
            <input type="text" id="unit-price" class="numpad-target" inputmode="none" placeholder="如: 150">
        </div>
        <div style="flex: 1;">
            <label>附加單價 (+)</label>
            <input type="text" id="extra-price" class="numpad-target highlight-input" inputmode="none" placeholder="如: 30" value="0">
        </div>
    </div>

    <div class="form-row" id="fabric-settings" style="display: flex;">
        <div style="flex: 1;">
            <label>布料倍數</label>
            <input type="text" id="multiplier" class="numpad-target" inputmode="none" value="2.0">
        </div>
        <div style="flex: 1;">
            <label>軌道單價</label>
            <input type="text" id="track-price" class="numpad-target" inputmode="none" value="60">
        </div>
    </div>

    <div class="form-group" id="fabric-height-group" style="display: none;">
        <label>布料捲軸高度 (cm) <span style="color: #ef4444; font-size: 14px;">※橫車/定寬專用</span></label>
        <input type="text" id="fabric-roll-h" class="numpad-target highlight-input" inputmode="none" value="280">
    </div>

    <label class="checkbox-container" id="lead-hem-group">
        <input type="checkbox" id="add-lead-hem">
        <span style="font-weight: 800;">➕ 底部加鉛條 (寬度×倍數×30)</span>
    </label>

    <div class="btn-group">
        <button class="btn btn-reset" onclick="resetForm()">🔄 重設</button>
        <button class="btn btn-calc" onclick="calculate()">💰 立即計算</button>
    </div>

    <div id="result-card" class="result-card">
        <div id="result-total" class="result-total">NT$ 0</div>
        <div id="result-details" class="result-details"></div>
    </div>
</div>

<div class="history-overlay" id="history-modal">
    <div class="history-panel">
        <div class="history-header-box">
            <h2>🕒 最近計價紀錄</h2>
            <div class="history-actions">
                <button class="btn-clear-history" onclick="clearHistory()">🗑 清空</button>
                <button class="btn-close-history" onclick="closeHistory()">關閉</button>
            </div>
        </div>
        <div class="history-list" id="history-list">
            </div>
    </div>
</div>

<div class="numpad-drawer" id="numpad-drawer">
    <div class="numpad-header-bar">
        <button class="btn-hide-numpad" onclick="hideNumpad()">完成 ⬇</button>
    </div>
    <div class="numpad-grid">
        <button class="numpad-btn" ontouchstart="typeNum('1')" onclick="typeNum('1')">1</button>
        <button class="numpad-btn" ontouchstart="typeNum('2')" onclick="typeNum('2')">2</button>
        <button class="numpad-btn" ontouchstart="typeNum('3')" onclick="typeNum('3')">3</button>
        <button class="numpad-btn" ontouchstart="typeNum('4')" onclick="typeNum('4')">4</button>
        <button class="numpad-btn" ontouchstart="typeNum('5')" onclick="typeNum('5')">5</button>
        <button class="numpad-btn" ontouchstart="typeNum('6')" onclick="typeNum('6')">6</button>
        <button class="numpad-btn" ontouchstart="typeNum('7')" onclick="typeNum('7')">7</button>
        <button class="numpad-btn" ontouchstart="typeNum('8')" onclick="typeNum('8')">8</button>
        <button class="numpad-btn" ontouchstart="typeNum('9')" onclick="typeNum('9')">9</button>
        <button class="numpad-btn" ontouchstart="typeNum('.')" onclick="typeNum('.')">.</button>
        <button class="numpad-btn" ontouchstart="typeNum('0')" onclick="typeNum('0')">0</button>
        <button class="numpad-btn numpad-action" ontouchstart="typeBackspace()" onclick="typeBackspace()">⌫</button>
    </div>
</div>

<script>
    let activeInput = null;
    let historyRecords = [];

    window.onload = function() {
        loadHistory();
        toggleFields();
    };

    /* 鍵盤邏輯 */
    document.querySelectorAll('.numpad-target').forEach(input => {
        input.addEventListener('focus', function() {
            activeInput = this;
            if (window.innerWidth < 768) {
                document.getElementById('numpad-drawer').classList.add('active');
                document.getElementById('main-container').style.paddingBottom = "350px";
                setTimeout(() => {
                    this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        });
    });

    function hideNumpad() {
        document.getElementById('numpad-drawer').classList.remove('active');
        document.getElementById('main-container').style.paddingBottom = "calc(20px + env(safe-area-inset-bottom))";
        if (activeInput) {
            activeInput.blur();
            activeInput = null;
        }
    }

    function typeNum(val) {
        if(event.type === 'touchstart') event.preventDefault(); 
        if (!activeInput) return;
        let start = activeInput.selectionStart;
        let end = activeInput.selectionEnd;
        let text = activeInput.value;
        if (val === '.' && text.includes('.')) return;
        activeInput.value = text.slice(0, start) + val + text.slice(end);
        activeInput.setSelectionRange(start + 1, start + 1);
    }

    function typeBackspace() {
        if(event.type === 'touchstart') event.preventDefault();
        if (!activeInput) return;
        let start = activeInput.selectionStart;
        let end = activeInput.selectionEnd;
        let text = activeInput.value;
        if (start === end && start > 0) {
            activeInput.value = text.slice(0, start - 1) + text.slice(end);
            activeInput.setSelectionRange(start - 1, start - 1);
        } else if (start !== end) {
            activeInput.value = text.slice(0, start) + text.slice(end);
            activeInput.setSelectionRange(start, start);
        }
    }

    /* 業務邏輯 */
    function toggleFields() {
        const cat = document.getElementById('category').value;
        const isFabric = (cat === 'five' || cat === 'nine' || cat === 'fixed');
        
        document.getElementById('fabric-settings').style.display = isFabric ? 'flex' : 'none';
        document.getElementById('lead-hem-group').style.display = isFabric ? 'flex' : 'none';
        document.getElementById('fabric-height-group').style.display = (cat === 'fixed') ? 'block' : 'none';
        document.getElementById('min-area-group').style.display = (cat === 'roll') ? 'block' : 'none';
    }

    const fmt = (num) => new Intl.NumberFormat('en-US').format(num);

    function resetForm() {
        hideNumpad();
        document.getElementById('width').value = '';
        document.getElementById('height').value = '';
        document.getElementById('unit-price').value = '';
        document.getElementById('extra-price').value = '0';
        document.getElementById('multiplier').value = '2.0';
        document.getElementById('track-price').value = '60';
        document.getElementById('fabric-roll-h').value = '280';
        document.getElementById('min-area').value = '15';
        document.getElementById('add-lead-hem').checked = false;
        
        document.getElementById('result-card').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function calculate() {
        hideNumpad();

        const cat = document.getElementById('category').value;
        const catSelect = document.getElementById('category');
        const catName = catSelect.options[catSelect.selectedIndex].text;

        const w_input = parseFloat(document.getElementById('width').value) || 0;
        const unit_w = document.getElementById('unit-w').value;
        const h_input = parseFloat(document.getElementById('height').value) || 0;
        const unit_h = document.getElementById('unit-h').value;

        const basePrice = parseFloat(document.getElementById('unit-price').value) || 0;
        const extraPrice = parseFloat(document.getElementById('extra-price').value) || 0;
        
        const multi = parseFloat(document.getElementById('multiplier').value) || 0;
        const trackPrice = parseFloat(document.getElementById('track-price').value) || 0;
        const fabricRollH = parseFloat(document.getElementById('fabric-roll-h').value) || 280;
        const minArea = parseFloat(document.getElementById('min-area').value) || 15;
        
        const isLeadHem = document.getElementById('add-lead-hem').checked;

        if (w_input <= 0 || h_input <= 0 || basePrice <= 0) {
            alert("請確實填寫「寬度」、「高度」與「基本單價」！");
            return;
        }

        const unitPrice = basePrice + extraPrice;
        let priceText = extraPrice > 0 ? `${basePrice} + ${extraPrice}(附加) = ${unitPrice}` : `${unitPrice}`;

        let w_cm, h_cm, w_ft, h_ft;
        let processText = `<span class="section-title">【尺寸解析】</span>\n`;

        if (unit_w === 'cm') {
            w_cm = w_input;
            w_ft = Math.ceil((w_cm / 30.3) * 10) / 10;
            processText += `寬度: ${w_cm}cm ➔ ${w_ft}尺\n`;
        } else {
            w_ft = w_input;
            w_cm = Math.round(w_ft * 30.3);
            processText += `寬度: ${w_ft}尺 ➔ ${w_cm}cm\n`;
        }

        if (unit_h === 'cm') {
            h_cm = h_input;
            h_ft = Math.ceil((h_cm / 30.3) * 10) / 10;
            processText += `高度: ${h_cm}cm ➔ ${h_ft}尺\n`;
        } else {
            h_ft = h_input;
            h_cm = Math.round(h_ft * 30.3);
            processText += `高度: ${h_ft}尺 ➔ ${h_cm}cm\n`;
        }

        processText += `單價計算: ${priceText}\n\n`;

        let total = 0;

        if (cat === 'roll') {
            let area = Math.ceil(w_ft * h_ft);
            let finalArea = Math.max(area, minArea);
            total = finalArea * unitPrice;
            processText += `<span class="section-title">【才數計算 (捲材)】</span>\n${w_ft} × ${h_ft} = ${area}才 (進位後)\n防呆設定: 最低 ${minArea}才\n計價才數: ${finalArea}才\n\n總價: ${finalArea}才 × ${unitPrice}元 = ${fmt(total)}元`;
        } else if (cat === 'door') {
            let h_door_ceil = Math.ceil(h_ft);
            let h_door = Math.max(7, h_door_ceil);
            let area = Math.ceil(w_ft * h_door);
            let finalArea = Math.max(area, 20);
            total = finalArea * unitPrice;
            processText += `<span class="section-title">【高度陷阱 (拉門)】</span>\n高 ${h_ft}尺 ➔ 進位至 ${h_door_ceil}尺\n最低7尺防呆 ➔ 計價高: ${h_door}尺\n\n<span class="section-title">【才數計算】</span>\n${w_ft} × ${h_door} = ${area}才 (進位後)\n防呆設定: 最低 20才\n計價才數: ${finalArea}才\n\n總價: ${finalArea}才 × ${unitPrice}元 = ${fmt(total)}元`;
        } else {
            let track_ft = Math.max(5, Math.ceil(w_ft));
            let totalTrack = track_ft * trackPrice;
            processText += `<span class="section-title">【軌道計算】</span>\n寬度進位: ${Math.ceil(w_ft)}尺 (低消5尺)\n計價軌道: ${track_ft}尺\n軌道總價: ${track_ft}尺 × ${trackPrice}元 = ${fmt(totalTrack)}元\n\n`;

            let totalFabPrice = 0;

            if (cat === 'five') {
                let panels = Math.ceil((w_ft * multi) / 5);
                let h_fab = Math.ceil(h_ft) + 1; 
                let totalFab = Math.ceil(panels * h_fab);
                totalFabPrice = totalFab * unitPrice;
                
                processText += `<span class="section-title">【布料計算 (五尺布)】</span>\n所需幅數: (${w_ft} × ${multi}) ÷ 5 ➔ 無條件進位 ${panels}幅\n計價高度: ${Math.ceil(h_ft)} + 1尺(損耗) = ${h_fab}尺\n總尺數: ${panels}幅 × ${h_fab}尺 = ${totalFab}尺\n布料總價: ${totalFab}尺 × ${unitPrice}元 = ${fmt(totalFabPrice)}元\n\n`;
            } else if (cat === 'nine') {
                let totalFab = Math.ceil(w_ft * multi);
                totalFabPrice = totalFab * unitPrice;
                
                processText += `<span class="section-title">【布料計算 (九呎布)】</span>\n總尺數: ${w_ft} × ${multi}倍 ➔ 無條件進位 ${totalFab}尺\n布料總價: ${totalFab}尺 × ${unitPrice}元 = ${fmt(totalFabPrice)}元\n\n`;
            } else if (cat === 'fixed') {
                let widthHint = (unit_w === 'cm') ? w_cm : `${w_ft}尺轉換為 ${w_cm}cm`;
                let panels = Math.ceil((w_cm * multi) / fabricRollH);
                let h_fab = Math.ceil(h_ft) + 1; 
                let totalFab = Math.ceil(panels * h_fab);
                totalFabPrice = totalFab * unitPrice;
                
                processText += `<span class="section-title">【布料計算 (定寬/橫車)】</span>\n所需幅數: (${widthHint} × ${multi}) ÷ ${fabricRollH}cm(布高) ➔ 無條件進位 ${panels}幅\n計價高度: ${Math.ceil(h_ft)} + 1尺(損耗) = ${h_fab}尺\n總尺數: ${panels}幅 × ${h_fab}尺 = ${totalFab}尺\n布料總價: ${totalFab}尺 × ${unitPrice}元 = ${fmt(totalFabPrice)}元\n\n`;
            }

            let leadHemPrice = 0;
            if (isLeadHem) {
                let lead_ft = Math.ceil(w_ft * multi);
                leadHemPrice = lead_ft * 30;
                processText += `<span class="section-title">【鉛條計算】</span>\n鉛條長度: ${w_ft}尺 × ${multi}倍 ➔ 進位 ${lead_ft}尺\n鉛條總價: ${lead_ft}尺 × 30元 = ${fmt(leadHemPrice)}元\n\n`;
            }

            total = totalFabPrice + totalTrack + leadHemPrice;

            let finalSummary = `最終總價: 布 ${fmt(totalFabPrice)} + 軌 ${fmt(totalTrack)}`;
            if (isLeadHem) finalSummary += ` + 鉛 ${fmt(leadHemPrice)}`;
            finalSummary += ` = ${fmt(total)}元`;

            processText += finalSummary;
        }

        const resCard = document.getElementById('result-card');
        resCard.style.display = 'block';
        document.getElementById('result-total').innerText = `NT$ ${fmt(total)}`;
        document.getElementById('result-details').innerHTML = processText;

        saveHistory(catName, w_input, unit_w, h_input, unit_h, total, processText);
        
        setTimeout(() => resCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    /* --- 歷史紀錄面板邏輯 --- */
    function openHistory() {
        hideNumpad();
        document.getElementById('history-modal').classList.add('active');
        renderHistory();
    }

    function closeHistory() {
        document.getElementById('history-modal').classList.remove('active');
    }

    function saveHistory(category, w, uW, h, uH, total, details) {
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        const newRecord = {
            id: Date.now(),
            time: timeStr,
            category: category,
            sizeStr: `寬 ${w}${uW} × 高 ${h}${uH}`,
            total: total,
            details: details
        };

        historyRecords.unshift(newRecord);
        if (historyRecords.length > 15) historyRecords.pop(); // 保留 15 筆

        localStorage.setItem('ousheng_records', JSON.stringify(historyRecords));
    }

    function loadHistory() {
        const saved = localStorage.getItem('ousheng_records');
        if (saved) historyRecords = JSON.parse(saved);
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';

        if (historyRecords.length === 0) {
            list.innerHTML = '<div class="history-empty">目前還沒有任何計價紀錄喔！</div>';
            return;
        }

        historyRecords.forEach(record => {
            const item = document.createElement('div');
            item.className = 'history-item';
            
            const cleanDetails = record.details.replace(/<span class="section-title">/g, '').replace(/<\/span>/g, '');

            item.innerHTML = `
                <div class="history-header">
                    <div>
                        <div class="history-category">${record.category}</div>
                        <div class="history-time">${record.time}</div>
                    </div>
                    <div class="history-total">NT$ ${fmt(record.total)}</div>
                </div>
                <div class="history-size">${record.sizeStr}</div>
                <button class="history-details-btn" onclick="toggleDetails(${record.id})">👀 查看詳細算式</button>
                <div class="history-details-content" id="details-${record.id}">${cleanDetails}</div>
            `;
            list.appendChild(item);
        });
    }

    function toggleDetails(id) {
        const detailDiv = document.getElementById(`details-${id}`);
        detailDiv.style.display = (detailDiv.style.display === 'block') ? 'none' : 'block';
    }

    function clearHistory() {
        if (confirm("確定要清空所有的歷史紀錄嗎？")) {
            historyRecords = [];
            localStorage.removeItem('ousheng_records');
            renderHistory();
        }
    }
</script>
